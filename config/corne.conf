# Set deep sleep to 30 minutes.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Make bluetooth stronger. Enable this if we encounter bluetooth connectivity
# issues.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Set keyboard name.
CONFIG_ZMK_KEYBOARD_NAME="Corne"

# Enable mouse emulation.
CONFIG_ZMK_POINTING=y
